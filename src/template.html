<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
</head>
<body>
    <div class="main-container">
        <nav>
            <button class="profile">
                <div class="icon">
                    <img src="./asset/flins.png">
                </div>
                <p contenteditable="true">Flins</p>
            </button>
            <button id="addToDo">
                <div class="icon">
                    <img src="./asset/plus-circle.svg">
                </div>
                <p>Add ToDo</p>
            </button>
            <div class="projects-container-nav">
                <div class="projects">
                </div>
            </div>
        </nav>
        <main>
            <div class="content">
            </div>
        </main>
    </div>
    <dialog class="create-dialog">
        <div class="container">
            <form>
                <div>
                    <input type="text" name="todo_title" id="inputTitle" placeholder="Title" required>
                </div>
                <div>
                    <input type="text" name="todo_description" id="inputDesc" placeholder="Description" required>
                </div>
                <input type="date" name="todo_dueDate" id="inputDue" required>
                <select name="todo_priority" id="prio" required>
                    <option value="" disabled selected>Priority</option>
                    <option value="low">
                        Low
                    </option>
                    <option value="med">
                        Medium
                    </option>
                    <option value="high">
                        High
                    </option>
                </select>
                
                <div class="hb"></div>
                
                <div class="bottom">
                    <div class="project-select">
                        <select name="todo_Destination" id="destination" required>
                        </select>
                        <button type="button" id="addProject">+</button>
                        <div class="input-container hidden">
                            <input type="text" id="newProjectInput">
                            <button type="button" id="projectConfirm">+</button>
                        </div>
                    </div>
                    <div class="buttons">
                        <button type="button" id="cancel"> Cancel</button>
                        <button type="submit" id="addTask">Add Task</button>
                    </div>
                </div>
            </form>
        </div>
    </dialog>
    <dialog class="todo-dialog">
        <div class="container">
            <div class="content">
                <div class="title">
                    <button class="flag"></button>
                    <p contenteditable="true">Grab a book</p>
                </div>
                <!-- <div class="description" contenteditable="true">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Commodi, tempore voluptate! Voluptatum id cum consectetur perferendis odio iste aliquam, officiis, provident fugiat eos cumque deserunt non sit quaerat laborum reprehenderit. Lorem ipsum dolor sit amet consectetur adipisicing elit. Esse nisi asperiores tenetur provident odit, harum magni est natus consectetur quis qui dolore vitae atque, sequi expedita? Voluptatibus facilis doloremque esse. Lorem ipsum dolor, sit amet consectetur adipisicing elit. Laboriosam nihil adipisci repudiandae assumenda quasi illo odit quos. Illo nemo aliquam magnam rerum. Lorem ipsum dolor sit amet consectetur adipisicing elit. Minima possimus adipisci in, necessitatibus voluptate odit. Odio, eligendi adipisci repudiandae ratione id suscipit laborum! Laudantium porro explicabo blanditiis tenetur voluptate facilis. Lorem ipsum dolor sit, amet consectetur adipisicing elit. Doloribus minus recusandae commodi aliquam tempora, laboriosam dolorem mollitia harum autem amet sed expedita atque error, ipsum reprehenderit animi tenetur accusamus quis a nobis consequatur itaque magni! Eum accusamus libero reiciendis praesentium distinctio est excepturi, saepe quod fugiat corporis quo soluta neque.</div> -->
                <div class="description" contenteditable="true">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Commodi, tempore voluptate corporis quo soluta neque.</div>
            </div>
            <div class="todo-bottom">
                <div>
                    <label for="date">Date</label>
                    <input type="date" id="date">
                </div>
                <div>
                    <label for="prio">Priority</label>
                    <select id="showPrio">
                        <option value="low">Low</option>
                        <option value="med">Medium</option>
                        <option value="high">HIgh</option>
                    </select>
                </div>
          
                <div class="buttons">
                    <button id="editCancel">Cancel</button>
                    <button id="editSave">Save</button>
                </div>
            </div>
        </div>
    </dialog>
</body>
</html>
