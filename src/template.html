<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
</head>
<body>
    <div class="main-container">
        <nav>
            <button class="profile">
                <div class="icon">
                    <img src="./asset/flins.png">
                </div>
                <p contenteditable="true">Flins</p>
            </button>
            <button id="addToDo">
                <div class="icon">
                    <img src="./asset/plus-circle.svg">
                </div>
                <p>Add ToDo</p>
            </button>
            <div class="projects-container-nav">
                <div class="projects">
                </div>
            </div>
        </nav>
        <main>
            <div class="content">
            </div>
        </main>
    </div>
    <dialog class="create-dialog">
        <div class="container">
            <form>
                <div>
                    <input type="text" name="todo_title" id="inputTitle" placeholder="Title" required>
                </div>
                <div>
                    <input type="text" name="todo_description" id="inputDesc" placeholder="Description" required>
                </div>
                <input type="date" name="todo_dueDate" id="inputDue" required>
                <select name="todo_Priority" id="prio" required>
                    <option value="" disabled selected>Priority</option>
                    <option value="low">
                        Low
                    </option>
                    <option value="med">
                        Medium
                    </option>
                    <option value="high">
                        High
                    </option>
                </select>
                
                <div class="hb"></div>
                
                <div class="bottom">
                    <div class="project-select">
                        <select name="todo_Destination" id="destination" required>
                        </select>
                        <button type="button" id="addProject">+</button>
                        <div class="input-container hidden">
                            <input type="text" id="newProjectInput">
                            <button type="button" id="projectConfirm">+</button>
                        </div>
                    </div>
                    <div class="buttons">
                        <button type="button" id="cancel"> Cancel</button>
                        <button type="submit" id="addTask">Add Task</button>
                    </div>
                </div>
            </form>
        </div>
    </dialog>
    <dialog class="todo-dialog">
        <div class="container">Hello World</div>
    </dialog>
</body>
</html>
