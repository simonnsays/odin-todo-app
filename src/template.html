<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
</head>
<body>
    <div class="page-container">
        <nav>
            <button class="profile">
                <div class="icon">
                    <img src="./asset/flins.png">
                </div>
                <p>Flins</p>
            </button>
            <button id="addToDo">
                <div class="icon">
                    <img src="./asset/plus-circle.svg">
                </div>
                <p>Add ToDo</p>
            </button>
            <div class="projects">
                <!-- <h3>My Projects</h3>
                <button class="project">
                    <div class="icon">
                        <img src="./asset/pound.svg">
                    </div>
                    <p>Skills</p>
                </button>
                <button class="project selected">
                    <div class="icon">
                        <img src="./asset/pound.svg">
                    </div>
                    <p>Skills</p>
                </button> -->
            </div>
        </nav>
        <main>
            <div class="content">
                <!-- <div class="header">Skills</div> -->
            </div>
        </main>
        <dialog>
            <div class="container">
                <div>
                    <input type="text" name="todo_Title" id="inputTitle">
                </div>
                <div>
                    <input type="text" name="todo_Description" id="inputDesc">
                </div>
                <input type="date" name="todo_DueDate" id="inputDue">
                <select name="todo_Priority" id="prio" place>
                    <option value="" disabled selected>Priority</option>
                    <option value="low">
                        Low
                    </option>
                    <option value="med">
                        Medium
                    </option>
                    <option value="high">
                        High
                    </option>
                </select>
                <select name="todo_Destination" id="destination">
                     <option value=""> New Project</option>
                    <option value="">Skills</option>
                </select>


                <div class="modal-buttons">
                    <button id="cancel"> Cancel</button>
                    <button id="addTask">Add Task</button>
                </div>
            </div>
        </dialog>
    </div>
</body>
</html>
